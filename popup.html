<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>note フォロワーチェッカー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }

    header {
      background: #41c9b4;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 15px; font-weight: 700; }

    #last-checked {
      font-size: 11px;
      opacity: 0.85;
    }

    #main { padding: 14px 16px; }

    #check-btn {
      width: 100%;
      padding: 9px;
      background: #41c9b4;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    #check-btn:hover { opacity: 0.85; }
    #check-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #check-btn.cooldown { opacity: 0.5; cursor: not-allowed; }
    #check-btn.cooldown:hover { opacity: 0.5; }

    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #666;
      min-height: 18px;
    }

    #summary {
      display: none;
      margin-top: 12px;
      display: flex;
      gap: 8px;
    }

    .summary-card {
      flex: 1;
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .summary-card .count { font-size: 22px; font-weight: 700; }
    .summary-card .label { font-size: 11px; margin-top: 2px; }

    .card-added   { background: #e8faf7; color: #1aaf96; }
    .card-removed { background: #fff0f0; color: #e05555; }
    .card-total   { background: #f5f5f5; color: #555; }

    #tabs {
      display: none;
      margin-top: 14px;
      border-bottom: 1px solid #e0e0e0;
    }

    .tab-btn {
      padding: 6px 12px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 12px;
      color: #888;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab-btn.active {
      color: #41c9b4;
      border-bottom-color: #41c9b4;
      font-weight: 600;
    }

    #diff-list {
      display: none;
      margin-top: 8px;
      max-height: 260px;
      overflow-y: auto;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .avatar-initial {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .diff-item {
      display: flex;
      align-items: center;
      padding: 6px 4px;
      border-bottom: 1px solid #f0f0f0;
      gap: 8px;
    }

    .diff-item:last-child { border-bottom: none; }

    .diff-item a {
      color: #333;
      text-decoration: none;
      font-weight: 500;
    }

    .diff-item a:hover { text-decoration: underline; color: #41c9b4; }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .badge-added    { background: #e8faf7; color: #1aaf96; }
    .badge-removed  { background: #fff0f0; color: #e05555; }
    .badge-withdrawn { background: #f5f0ff; color: #8855dd; }

    #msg-baseline {
      display: none;
      margin-top: 12px;
      background: #e8faf7;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #1aaf96;
      line-height: 1.5;
    }

    #error-msg {
      display: none;
      margin-top: 12px;
      background: #fff0f0;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #e05555;
    }

    #warn-msg {
      display: none;
      margin-top: 10px;
      background: #fffbe6;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #856404;
    }

    .empty-note {
      padding: 16px;
      text-align: center;
      color: #aaa;
      font-size: 12px;
    }

    #settings-link {
      display: block;
      margin-top: 10px;
      text-align: right;
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>note フォロワーチェッカー</h1>
    <span id="last-checked"></span>
  </header>

  <div id="main">
    <button id="check-btn">チェック</button>
    <div id="status"></div>

    <div id="msg-baseline">
      ベースライン保存済み。次回チェック時から差分が表示されます。
    </div>

    <div id="error-msg"></div>
    <div id="warn-msg"></div>

    <div id="summary" style="display:none">
      <div class="summary-card card-added">
        <div class="count" id="cnt-added">0</div>
        <div class="label">新規</div>
      </div>
      <div class="summary-card card-removed">
        <div class="count" id="cnt-removed">0</div>
        <div class="label">減少</div>
      </div>
      <div class="summary-card card-total">
        <div class="count" id="cnt-total">0</div>
        <div class="label">合計</div>
      </div>
    </div>

    <div id="tabs">
      <button class="tab-btn active" data-tab="all">すべて</button>
      <button class="tab-btn" data-tab="added">新規</button>
      <button class="tab-btn" data-tab="removed">フォロー外し</button>
    </div>

    <div id="diff-list"></div>

    <a id="settings-link">設定</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
